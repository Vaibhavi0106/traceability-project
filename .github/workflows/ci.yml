name: Traceability CI

on:
  push:
  pull_request:

jobs:
  test-and-trace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests and generate JSON report
        run: |
          pytest --json-report --json-report-file=report.json || true

      - name: Run traceability script
        run: |
          python traceability.py

      - name: Upload report.json
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.json

      - name: Upload traceability CSV
        uses: actions/upload-artifact@v4
        with:
          name: traceability-matrix
          path: traceability_matrix.csv